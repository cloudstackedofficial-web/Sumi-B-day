<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Just One Minute</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#fdfbfb,#ebedee);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.card{
    width:90%;
    max-width:500px;
    background:white;
    border-radius:20px;
    padding:30px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

img{
    width:180px;
    height:180px;
    border-radius:50%;
    object-fit:cover;
    border:5px solid #ffb6c1;
}

h1{
    color:#444;
}

button{
    background:#ff6b81;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:30px;
    cursor:pointer;
    font-size:16px;
}

.message{
    display:none;
    margin-top:20px;
    font-size:18px;
    color:#555;
    line-height:1.6;
}
</style>
</head>

<body>

<div class="card">
    <img src="YOUR_IMAGE_URL" alt="Photo">

    <h1>Hi 😊</h1>

    <p>Before you leave, click the button once.</p>

    <button onclick="showMessage()">Open</button>

    <div class="message" id="msg">
        I'm sorry. <br><br>

        I know you're upset and I completely understand.<br>

        I'm not asking you to forget anything.<br>

        Just give me one chance to talk.<br><br>

        If possible, unblock me and call me when you're free. 📞<br><br>

        That's all. ❤️
    </div>
</div>

<script>
function showMessage(){
 document.getElementById('msg').style.display='block';
}
</script>

</body>
</html>
